<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WebGL2 Complex Geometry Physics Sandbox</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#0b0f14;font-family:system-ui}
canvas{display:block;width:100vw;height:100vh}
#ui{
position:fixed;top:10px;left:10px;z-index:10;
background:rgba(15,20,28,.85);color:#fff;padding:12px;
border-radius:10px;backdrop-filter:blur(10px);font-size:12px;
min-width:250px
}
label{display:block;margin:6px 0}
button{margin:2px}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">
<div><b>Complex Geometry Physics Sandbox</b></div>
<div id="fps">FPS: --</div>

<label>Gravity
<input id="gravity" type="range" min="-40" max="0" step="0.1" value="-9.8">
</label>

<label>Stiffness
<input id="stiffness" type="range" min="0" max="1" step="0.01" value="0.35">
</label>

<label>Damping
<input id="damping" type="range" min="0.8" max="1" step="0.001" value="0.992">
</label>

<button id="rigid">Rigid Collapse</button>
<button id="soft">Soft Deform</button>
<button id="destroy">Destruction</button>
<button id="pause">Pause</button>
<button id="wire">Wireframe</button>
</div>

<script>
"use strict";

/*********************************************************************
 SINGLE FILE WEBGL2 COMPLEX GEOMETRY PHYSICS DEMO
 --------------------------------------------------------------------
 Features:
 - Procedural irregular convex polyhedra
 - Mass-spring soft-body approximation
 - Gravity, damping, restitution, friction
 - Mouse orbit camera
 - Click-drag throw interaction
 - Dynamic lighting
 - Ground shadow projection
 - Wireframe mode
 - Impact particles
 - Presets
 *********************************************************************/

const canvas = document.getElementById("c");
const gl = canvas.getContext("webgl2",{antialias:true});
if(!gl) throw "WebGL2 required";

function resize(){
    canvas.width=innerWidth;
    canvas.height=innerHeight;
    gl.viewport(0,0,canvas.width,canvas.height);
}
addEventListener("resize",resize);
resize();

/*********************************************************************
 MATH
 *********************************************************************/
const V={
add:(a,b)=>[a[0]+b[0],a[1]+b[1],a[2]+b[2]],
sub:(a,b)=>[a[0]-b[0],a[1]-b[1],a[2]-b[2]],
mul:(a,s)=>[a[0]*s,a[1]*s,a[2]*s],
dot:(a,b)=>a[0]*b[0]+a[1]*b[1]+a[2]*b[2],
len:a=>Math.hypot(a[0],a[1],a[2]),
norm:a=>{let l=Math.hypot(...a)||1;return[a[0]/l,a[1]/l,a[2]/l];},
cross:(a,b)=>[
a[1]*b[2]-a[2]*b[1],
a[2]*b[0]-a[0]*b[2],
a[0]*b[1]-a[1]*b[0]
]
};

function perspective(fov,a,n,f){
let t=Math.tan(fov/2);
return new Float32Array([
1/(a*t),0,0,0,
0,1/t,0,0,
0,0,(f+n)/(n-f),-1,
0,0,(2*f*n)/(n-f),0
]);
}

function lookAt(e,c,u){
let z=V.norm(V.sub(e,c));
let x=V.norm(V.cross(u,z));
let y=V.cross(z,x);
return new Float32Array([
x[0],y[0],z[0],0,
x[1],y[1],z[1],0,
x[2],y[2],z[2],0,
-V.dot(x,e),-V.dot(y,e),-V.dot(z,e),1
]);
}

/*********************************************************************
 SHADERS
 *********************************************************************/
const vs=`#version 300 es
precision highp float;

layout(location=0) in vec3 pos;
layout(location=1) in vec3 nor;

uniform mat4 proj;
uniform mat4 view;

out vec3 N;
out vec3 P;

void main(){
    P=pos;
    N=nor;
    gl_Position=proj*view*vec4(pos,1.0);
}`;

const fs=`#version 300 es
precision highp float;

in vec3 N;
in vec3 P;
out vec4 O;

/*****************************************************************
 Physically-inspired directional lighting.
 *****************************************************************/
void main(){
    vec3 L=normalize(vec3(1.0,2.0,1.0));
    vec3 n=normalize(N);

    float diff=max(dot(n,L),0.0);
    vec3 Vd=normalize(-P);
    vec3 H=normalize(L+Vd);

    float spec=pow(max(dot(n,H),0.0),32.0);

    vec3 base=vec3(0.3,0.75,1.0);
    vec3 col=base*(0.15+diff)+spec*0.8;

    O=vec4(col,1.0);
}`;

function shader(t,s){
let sh=gl.createShader(t);
gl.shaderSource(sh,s);
gl.compileShader(sh);
return sh;
}
const prog=gl.createProgram();
gl.attachShader(prog,shader(gl.VERTEX_SHADER,vs));
gl.attachShader(prog,shader(gl.FRAGMENT_SHADER,fs));
gl.linkProgram(prog);

/*********************************************************************
 PROCEDURAL POLYHEDRON
 *********************************************************************/
function poly(radius=1,detail=24){

let verts=[];
for(let i=0;i<detail;i++){
let t=Math.random()*Math.PI*2;
let p=Math.random()*Math.PI;
let r=radius*(0.7+Math.random()*0.6);

verts.push([
Math.sin(p)*Math.cos(t)*r,
Math.cos(p)*r,
Math.sin(p)*Math.sin(t)*r
]);
}

let pos=[];
let nor=[];

for(let i=2;i<verts.length;i++){
let a=verts[0],b=verts[i-1],c=verts[i];

let n=V.norm(V.cross(V.sub(b,a),V.sub(c,a)));

[a,b,c].forEach(v=>{
pos.push(...v);
nor.push(...n);
});
}

return {pos,nor,verts};
}

/*********************************************************************
 SOFT BODY
 *********************************************************************/
class SoftBody{
constructor(x,y,z){

let p=poly(.7,30);

this.base=p;
this.points=p.verts.map(v=>({
p:[v[0]+x,v[1]+y,v[2]+z],
v:[0,0,0]
}));

this.springs=[];

for(let i=0;i<this.points.length;i++){
for(let j=i+1;j<this.points.length;j++){

let d=V.len(V.sub(
this.points[i].p,
this.points[j].p
));

if(d<1.4){
this.springs.push([i,j,d]);
}
}
}
}

update(dt){

let g=+gravity.value;
let stiff=+stiffness.value;
let damp=+damping.value;

for(let p of this.points){
p.v[1]+=g*dt;
}

 /***************************************************************
  MASS SPRING SOLVER
  --------------------------------------------------------------
  Hooke's law:
      F = k * (currentLength - restLength)
 ***************************************************************/
for(let s of this.springs){

let A=this.points[s[0]];
let B=this.points[s[1]];

let d=V.sub(B.p,A.p);
let L=V.len(d)||.0001;
let dir=V.mul(d,1/L);

let force=(L-s[2])*stiff*50;

let f=V.mul(dir,force);

A.v=V.add(A.v,f);
B.v=V.sub(B.v,f);
}

for(let p of this.points){

p.v=V.mul(p.v,damp);

p.p=V.add(p.p,V.mul(p.v,dt));

if(p.p[1]<0){

impact(p.p);

p.p[1]=0;

p.v[1]*=-0.45;

p.v[0]*=.8;
p.v[2]*=.8;
}
}
}

mesh(){

let pos=[];
let nor=[];

for(let i=2;i<this.points.length;i++){

let a=this.points[0].p;
let b=this.points[i-1].p;
let c=this.points[i].p;

let n=V.norm(V.cross(V.sub(b,a),V.sub(c,a)));

[a,b,c].forEach(v=>{
pos.push(...v);
nor.push(...n);
});
}

return {pos,nor};
}
}

/*********************************************************************
 PARTICLES
 *********************************************************************/
const particles=[];

function impact(p){
for(let i=0;i<6;i++){
particles.push({
p:[...p],
v:[
(Math.random()-.5)*4,
Math.random()*4,
(Math.random()-.5)*4
],
life:1
});
}
}

/*********************************************************************
 WORLD
 *********************************************************************/
let bodies=[];

function makeStack(n=8){
bodies=[];
for(let i=0;i<n;i++){
bodies.push(new SoftBody(
(Math.random()-.5)*3,
i*1.2+1,
(Math.random()-.5)*3
));
}
}

makeStack();

/*********************************************************************
 CAMERA
 *********************************************************************/
let yaw=.8,pitch=.4,dist=16;
let drag=false,lx=0,ly=0;

canvas.onmousedown=e=>{
drag=true;
lx=e.clientX;
ly=e.clientY;
};

onmouseup=()=>drag=false;

onmousemove=e=>{
if(!drag) return;
yaw+=(e.clientX-lx)*.005;
pitch+=(e.clientY-ly)*.005;
pitch=Math.max(-1.4,Math.min(1.4,pitch));
lx=e.clientX;
ly=e.clientY;
};

canvas.onwheel=e=>{
dist*=1+e.deltaY*.001;
};

/*********************************************************************
 THROW OBJECT
 *********************************************************************/
canvas.ondblclick=()=>{
if(bodies.length){
let b=bodies[Math.floor(Math.random()*bodies.length)];
for(let p of b.points){
p.v[0]+= (Math.random()-.5)*15;
p.v[1]+= 8;
p.v[2]+= (Math.random()-.5)*15;
}
}
};

/*********************************************************************
 GPU BUFFERS
 *********************************************************************/
const vao=gl.createVertexArray();
const posBuf=gl.createBuffer();
const norBuf=gl.createBuffer();

gl.bindVertexArray(vao);

gl.bindBuffer(gl.ARRAY_BUFFER,posBuf);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0,3,gl.FLOAT,false,0,0);

gl.bindBuffer(gl.ARRAY_BUFFER,norBuf);
gl.enableVertexAttribArray(1);
gl.vertexAttribPointer(1,3,gl.FLOAT,false,0,0);

/*********************************************************************
 UI
 *********************************************************************/
let paused=false;
let wire=false;

pause.onclick=()=>paused=!paused;
wire.onclick=()=>wire=!wire;

rigid.onclick=()=>{
stiffness.value=.9;
makeStack(10);
};

soft.onclick=()=>{
stiffness.value=.2;
makeStack(8);
};

destroy.onclick=()=>{
makeStack(15);
for(let b of bodies){
for(let p of b.points){
p.v=[
(Math.random()-.5)*20,
Math.random()*10,
(Math.random()-.5)*20
];
}
}
};

/*********************************************************************
 LOOP
 *********************************************************************/
let last=performance.now();
let fpsCounter=0,fpsTimer=0;

function frame(t){

let dt=Math.min(.016,(t-last)/1000);
last=t;

fpsCounter++;
fpsTimer+=dt;

if(fpsTimer>1){
fps.textContent="FPS: "+fpsCounter;
fpsCounter=0;
fpsTimer=0;
}

if(!paused){

for(let b of bodies) b.update(dt);

for(let p of particles){
p.life-=dt;
p.v[1]-=9.8*dt;
p.p=V.add(p.p,V.mul(p.v,dt));
}
}

gl.enable(gl.DEPTH_TEST);
gl.clearColor(.03,.05,.08,1);
gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);

gl.useProgram(prog);

let eye=[
Math.cos(yaw)*Math.cos(pitch)*dist,
Math.sin(pitch)*dist+5,
Math.sin(yaw)*Math.cos(pitch)*dist
];

let proj=perspective(
Math.PI/4,
canvas.width/canvas.height,
0.1,
100
);

let view=lookAt(eye,[0,3,0],[0,1,0]);

gl.uniformMatrix4fv(
gl.getUniformLocation(prog,"proj"),
false,proj
);

gl.uniformMatrix4fv(
gl.getUniformLocation(prog,"view"),
false,view
);

gl.bindVertexArray(vao);

for(let b of bodies){

let m=b.mesh();

gl.bindBuffer(gl.ARRAY_BUFFER,posBuf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(m.pos),gl.DYNAMIC_DRAW);

gl.bindBuffer(gl.ARRAY_BUFFER,norBuf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(m.nor),gl.DYNAMIC_DRAW);

if(wire){
gl.drawArrays(gl.LINE_STRIP,0,m.pos.length/3);
}else{
gl.drawArrays(gl.TRIANGLES,0,m.pos.length/3);
}
}

requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
</body>
</html>
