// RIGID BODY PHYSICS
// =============================================
// Complete rigid body dynamics implementation with:
// - Position and orientation integration
// - Linear and angular velocity
// - Inertia tensor calculation
// - Force and impulse application

class RigidBody {
    /**
     * Create a rigid body
     * @param {Shape} shape - The shape of the body
     * @param {Float32Array} position - Initial position
     * @param {number} mass - Mass of the body
     * @param {boolean} fixed - Whether the body is fixed (infinite mass)
     */
    constructor(shape, position = MathUtils.vec3.create(), mass = 1, fixed = false) {
        this.shape = shape;
        this.position = MathUtils.vec3.copy(position);
        this.velocity = MathUtils.vec3.create();
        this.angularVelocity = MathUtils.vec3.create();
        this.orientation = MathUtils.quat.identity();
        this.mass = mass;
        this.invMass = fixed ? 0 : 1 / mass;
        this.fixed = fixed;

        // Physics properties
        this.restitution = CONFIG.restitution;
        this.friction = CONFIG.friction;

        // Color for rendering
        this.color = MathUtils.randomColor();

        // Inertia tensor in local space (diagonal for simplicity)
        this.localInertia = MathUtils.mat4.identity();
        this.invLocalInertia = MathUtils.mat4.identity();

        // Calculate inertia tensor for common shapes
        this.calculateInertiaTensor();

        // World space inertia tensor (updated each frame)
        this.worldInertia = MathUtils.mat4.identity();
        this.invWorldInertia = MathUtils.mat4.identity();

        // Transform matrix (cached)
        this.transformMatrix = MathUtils.mat4.identity();

        // AABB in world space (cached)
        this.worldAABB = { min: MathUtils.vec3.create(), max: MathUtils.vec3.create() };

        // For collision response
        this.collisionNormal = MathUtils.vec3.create();
        this.collisionDepth = 0;

        // Update derived properties
        this.updateTransform();
        this.updateAABB();
    }

    /**
     * Calculate inertia tensor based on shape type
     */
    calculateInertiaTensor() {
        // For a unit cube with mass m:
        // I = (m/6) * diag(1, 1, 1)
        // For a sphere: I = (2/5 * m * r^2) * I
        // For simplicity, we'll use a diagonal matrix for all shapes

        const scale = 1.0; // Would be based on actual shape dimensions

        switch (this.shape.type) {
            case 'cube':
                // For a cube of side length s: I = (m * s^2 / 6) * diag(1, 1, 1)
                this.localInertia[0] = this.mass * scale * scale / 6;
                this.localInertia[5] = this.mass * scale * scale / 6;
                this.localInertia[10] = this.mass * scale * scale / 6;
                break;

            case 'icosahedron':
            case 'dodecahedron':
                // For a sphere approximation: I = (2/5 * m * r^2) * I
                this.localInertia[0] = 0.4 * this.mass * scale * scale;
                this.localInertia[5] = 0.4 * this.mass * scale * scale;
                this.localInertia[10] = 0.4 * this.mass * scale * scale;
                break;

            case 'tetrahedron':
                // For a tetrahedron: I = (m * s^2 / 20) * diag(1, 1, 1) approximately
                this.localInertia[0] = this.mass * scale * scale / 20;
                this.localInertia[5] = this.mass * scale * scale / 20;
                this.localInertia[10] = this.mass * scale * scale / 20;
                break;

            case 'torus':
                // For a torus: I = m * (R^2 + (3/4) * r^2) * diag(1, 1, 1) approximately
                this.localInertia[0] = this.mass * (scale * scale + 0.75 * scale * scale);
                this.localInertia[5] = this.mass * (scale * scale + 0.75 * scale * scale);
                this.localInertia[10] = this.mass * (scale * scale + 0.75 * scale * scale);
                break;

            default:
                // Default to cube inertia
                this.localInertia[0] = this.mass * scale * scale / 6;
                this.localInertia[5] = this.mass * scale * scale / 6;
                this.localInertia[10] = this.mass * scale * scale / 6;
        }

        // Inverse inertia
        this.invLocalInertia[0] = 1 / this.localInertia[0];
        this.invLocalInertia[5] = 1 / this.localInertia[5];
        this.invLocalInertia[10] = 1 / this.localInertia[10];
    }

    /**
     * Update the transformation matrix
     */
    updateTransform() {
        // Create transformation matrix: translation * rotation
        const t = MathUtils.mat4.translate(
            MathUtils.mat4.identity(),
            this.position
        );

        const r = MathUtils.quat.toMat4(this.orientation);

        this.transformMatrix = MathUtils.mat4.multiply(t, r);

        // Update world inertia tensor
        // I_world = R * I_local * R^T
        const rot = MathUtils.mat4.getRotation(this.transformMatrix);
        this.worldInertia = MathUtils.mat4.multiply(
            MathUtils.mat4.multiply(rot, this.localInertia),
            MathUtils.mat4.transpose(rot)
        );

        // Inverse world inertia
        this.invWorldInertia = MathUtils.mat4.inverse(this.worldInertia);
    }

    /**
     * Update the world-space AABB
     */
    updateAABB() {
        // Transform all 8 corners of the local AABB
        const corners = [
            [this.shape.localAABB.min[0], this.shape.localAABB.min[1], this.shape.localAABB.min[2]],
            [this.shape.localAABB.max[0], this.shape.localAABB.min[1], this.shape.localAABB.min[2]],
            [this.shape.localAABB.min[0], this.shape.localAABB.max[1], this.shape.localAABB.min[2]],
            [this.shape.localAABB.max[0], this.shape.localAABB.max[1], this.shape.localAABB.min[2]],
            [this.shape.localAABB.min[0], this.shape.localAABB.min[1], this.shape.localAABB.max[2]],
            [this.shape.localAABB.max[0], this.shape.localAABB.min[1], this.shape.localAABB.max[2]],
            [this.shape.localAABB.min[0], this.shape.localAABB.max[1], this.shape.localAABB.max[2]],
            [this.shape.localAABB.max[0], this.shape.localAABB.max[1], this.shape.localAABB.max[2]]
        ];

        let min = [Infinity, Infinity, Infinity];
        let max = [-Infinity, -Infinity, -Infinity];

        for (const corner of corners) {
            const x = this.transformMatrix[0]*corner[0] + this.transformMatrix[4]*corner[1] + this.transformMatrix[8]*corner[2] + this.transformMatrix[12];
            const y = this.transformMatrix[1]*corner[0] + this.transformMatrix[5]*corner[1] + this.transformMatrix[9]*corner[2] + this.transformMatrix[13];
            const z = this.transformMatrix[2]*corner[0] + this.transformMatrix[6]*corner[1] + this.transformMatrix[10]*corner[2] + this.transformMatrix[14];

            min[0] = Math.min(min[0], x);
            min[1] = Math.min(min[1], y);
            min[2] = Math.min(min[2], z);

            max[0] = Math.max(max[0], x);
            max[1] = Math.max(max[1], y);
            max[2] = Math.max(max[2], z);
        }

        this.worldAABB.min = MathUtils.vec3.create(min[0], min[1], min[2]);
        this.worldAABB.max = MathUtils.vec3.create(max[0], max[1], max[2]);
    }

    /**
     * Apply a force to the body
     * @param {Float32Array} force - Force vector
     * @param {Float32Array} point - Point of application in world space
     */
    applyForce(force, point = null) {
        if (this.fixed) return;

        // Linear force: F = ma => a = F/m
        this.velocity[0] += force[0] * this.invMass * world.dt;
        this.velocity[1] += force[1] * this.invMass * world.dt;
        this.velocity[2] += force[2] * this.invMass * world.dt;

        if (point) {
            // Torque: τ = r × F
            const r = MathUtils.vec3.sub(point, this.position);
            const torque = MathUtils.vec3.cross(r, force);

            // Convert torque to body space
            const invRot = MathUtils.quat.conjugate(this.orientation);
            const bodyTorque = MathUtils.quat.rotateVec3(torque, invRot);

            // Angular acceleration: α = I^(-1) * τ
            this.angularVelocity[0] += bodyTorque[0] * this.invLocalInertia[0] * world.dt;
            this.angularVelocity[1] += bodyTorque[1] * this.invLocalInertia[5] * world.dt;
            this.angularVelocity[2] += bodyTorque[2] * this.invLocalInertia[10] * world.dt;
        }
    }

    /**
     * Apply an impulse to the body
     * @param {Float32Array} impulse - Impulse vector
     * @param {Float32Array} point - Point of application in world space
     */
    applyImpulse(impulse, point = null) {
        if (this.fixed) return;

        // Linear impulse: v += J / m
        this.velocity[0] += impulse[0] * this.invMass;
        this.velocity[1] += impulse[1] * this.invMass;
        this.velocity[2] += impulse[2] * this.invMass;

        if (point) {
            // Torque impulse: τ = r × J
            const r = MathUtils.vec3.sub(point, this.position);
            const torqueImpulse = MathUtils.vec3.cross(r, impulse);

            // Convert to body space
            const invRot = MathUtils.quat.conjugate(this.orientation);
            const bodyTorqueImpulse = MathUtils.quat.rotateVec3(torqueImpulse, invRot);

            // Angular velocity: ω += I^(-1) * τ
            this.angularVelocity[0] += bodyTorqueImpulse[0] * this.invLocalInertia[0];
            this.angularVelocity[1] += bodyTorqueImpulse[1] * this.invLocalInertia[5];
            this.angularVelocity[2] += bodyTorqueImpulse[2] * this.invLocalInertia[10];
        }
    }

    /**
     * Update the body's state
     * @param {number} dt - Time step
     */
    update(dt) {
        if (this.fixed) return;

        // Apply gravity
        const gravity = MathUtils.vec3.create(0, CONFIG.gravity * dt, 0);
        this.velocity = MathUtils.vec3.add(this.velocity, gravity);

        // Apply damping
        this.velocity = MathUtils.vec3.scale(this.velocity, CONFIG.damping);
        this.angularVelocity = MathUtils.vec3.scale(this.angularVelocity, CONFIG.damping);

        // Update position: p += v * dt
        this.position[0] += this.velocity[0] * dt;
        this.position[1] += this.velocity[1] * dt;
        this.position[2] += this.velocity[2] * dt;

        // Update orientation: q += 0.5 * q * ω * dt
        const angularVelQuat = MathUtils.quat.fromAxisAngle(
            this.angularVelocity,
            MathUtils.vec3.len(this.angularVelocity) * dt
        );
        this.orientation = MathUtils.quat.normalize(
            MathUtils.quat.multiply(this.orientation, angularVelQuat)
        );

        // Update derived properties
        this.updateTransform();
        this.updateAABB();
    }
};

// =============================================
// SOFT BODY PHYSICS (Mass-Spring System)
// =============================================
// Tetrahedral-based soft body simulation with:
// - Mass-spring model
// - Vertex positions and velocities
// - Structural, shear, and bend springs
// - Collision with rigid bodies

class SoftBody {
    /**
     * Create a soft body from a tetrahedral mesh
     * @param {Object} geometry - Geometry data
     * @param {Float32Array} position - Initial position
     * @param {number} mass - Total mass
     * @param {number} stiffness - Spring stiffness
     * @param {number} damping - Damping coefficient
     */
    constructor(geometry, position = MathUtils.vec3.create(), mass = 1, stiffness = 500, damping = 0.99) {
        this.position = MathUtils.vec3.copy(position);
        this.mass = mass;
        this.stiffness = stiffness;
        this.damping = damping;

        // Extract vertices from geometry
        this.vertices = [];
        this.velocities = [];
        this.forces = [];
        this.invMasses = [];

        // For a soft body, we'll use a simplified tetrahedral mesh
        // Extract unique vertices from the geometry
        const vertexMap = new Map();
        const positions = [];

        for (let i = 0; i < geometry.vertices.length; i += 8) {
            const x = geometry.vertices[i];
            const y = geometry.vertices[i+1];
            const z = geometry.vertices[i+2];
            const key = `${x.toFixed(6)},${y.toFixed(6)},${z.toFixed(6)}`;

            if (!vertexMap.has(key)) {
                vertexMap.set(key, this.vertices.length);
                positions.push([x, y, z]);
                this.vertices.push(MathUtils.vec3.create(x, y, z));
                this.velocities.push(MathUtils.vec3.create());
                this.forces.push(MathUtils.vec3.create());
                this.invMasses.push(1 / (mass / positions.length));
            }
        }

        // Create springs between vertices
        this.springs = [];
        const springDistance = 0.2; // Approximate distance for springs

        // Connect vertices that are close to each other
        for (let i = 0; i < this.vertices.length; i++) {
            for (let j = i + 1; j < this.vertices.length; j++) {
                const dist = MathUtils.vec3.dist(this.vertices[i], this.vertices[j]);
                if (dist < springDistance * 1.5) {
                    this.springs.push({
                        a: i,
                        b: j,
                        restLength: dist,
                        stiffness: stiffness * (1 - dist / (springDistance * 1.5))
                    });
                }
            }
        }

        // Color for rendering
        this.color = [0.8, 0.4, 0.6];

        // For rendering, we'll use the original geometry but update vertex positions
        this.baseVertices = new Float32Array(geometry.vertices);
        this.indices = geometry.indices;
        this.type = geometry.type;

        // AABB
        this.worldAABB = { min: MathUtils.vec3.create(), max: MathUtils.vec3.create() };
        this.updateAABB();
    }

    /**
     * Update the world-space AABB
     */
    updateAABB() {
        let min = [Infinity, Infinity, Infinity];
        let max = [-Infinity, -Infinity, -Infinity];

        for (const v of this.vertices) {
            min[0] = Math.min(min[0], v[0]);
            min[1] = Math.min(min[1], v[1]);
            min[2] = Math.min(min[2], v[2]);

            max[0] = Math.max(max[0], v[0]);
            max[1] = Math.max(max[1], v[1]);
            max[2] = Math.max(max[2], v[2]);
        }

        this.worldAABB.min = MathUtils.vec3.create(min[0], min[1], min[2]);
        this.worldAABB.max = MathUtils.vec3.create(max[0], max[1], max[2]);
    }

    /**
     * Apply a force to a vertex
     * @param {number} index - Vertex index
     * @param {Float32Array} force - Force vector
     */
    applyForce(index, force) {
        if (index >= 0 && index < this.forces.length) {
            this.forces[index][0] += force[0];
            this.forces[index][1] += force[1];
            this.forces[index][2] += force[2];
        }
    }

    /**
     * Update the soft body
     * @param {number} dt - Time step
     */
    update(dt) {
        // Apply gravity to all vertices
        const gravity = MathUtils.vec3.create(0, CONFIG.gravity, 0);

        for (let i = 0; i < this.vertices.length; i++) {
            // Reset forces
            this.forces[i][0] = gravity[0] * this.invMasses[i];
            this.forces[i][1] = gravity[1] * this.invMasses[i];
            this.forces[i][2] = gravity[2] * this.invMasses[i];
        }

        // Apply spring forces
        for (const spring of this.springs) {
            const a = this.vertices[spring.a];
            const b = this.vertices[spring.b];

            const delta = MathUtils.vec3.sub(b, a);
            const dist = MathUtils.vec3.len(delta);

            if (dist > MathUtils.EPSILON) {
                const dir = MathUtils.vec3.scale(delta, 1 / dist);
                const displacement = dist - spring.restLength;
                const forceMagnitude = spring.stiffness * displacement;

                const force = MathUtils.vec3.scale(dir, forceMagnitude);

                this.forces[spring.a] = MathUtils.vec3.add(this.forces[spring.a], force);
                this.forces[spring.b] = MathUtils.vec3.sub(this.forces[spring.b], force);
            }
        }

        // Update vertex positions
        for (let i = 0; i < this.vertices.length; i++) {
            // Apply damping
            this.velocities[i] = MathUtils.vec3.scale(this.velocities[i], this.damping);

            // Update velocity
            this.velocities[i][0] += this.forces[i][0] * dt;
            this.velocities[i][1] += this.forces[i][1] * dt;
            this.velocities[i][2] += this.forces[i][2] * dt;

            // Update position
            this.vertices[i][0] += this.velocities[i][0] * dt;
            this.vertices[i][1] += this.velocities[i][1] * dt;
            this.vertices[i][2] += this.velocities[i][2] * dt;
        }

        // Update AABB
        this.updateAABB();
    }

    /**
     * Get the transformed vertices for rendering
     * @returns {Float32Array} Transformed vertices
     */
    getTransformedVertices() {
        // For now, just return the base vertices with updated positions
        // In a more complete implementation, we'd properly transform the mesh
        const transformed = new Float32Array(this.baseVertices.length);

        for (let i = 0, j = 0; i < this.vertices.length; i++, j += 8) {
            // Copy position
            transformed[j] = this.vertices[i][0];
            transformed[j+1] = this.vertices[i][1];
            transformed[j+2] = this.vertices[i][2];

            // Copy normal from base vertices
            transformed[j+3] = this.baseVertices[j+3];
            transformed[j+4] = this.baseVertices[j+4];
            transformed[j+5] = this.baseVertices[j+5];

            // Copy texture coordinates
            transformed[j+6] = this.baseVertices[j+6];
            transformed[j+7] = this.baseVertices[j+7];
        }

        return transformed;
    }
}

// =============================================
// PHYSICS WORLD
// =============================================
// Manages all physics objects and handles:
// - Broad phase collision detection (spatial partitioning)
// - Narrow phase collision detection (GJK/EPA)
// - Collision resolution
// - Constraint solving

class PhysicsWorld {
    constructor() {
        this.objects = []; // All physics objects (rigid and soft bodies)
        this.rigidBodies = []; // Only rigid bodies
        this.softBodies = []; // Only soft bodies
        this.time = 0;
        this.dt = 1/60;
        this.lastTime = 0;
        this.collisionPairs = [];
    }

    /**
     * Add an object to the world
     * @param {RigidBody|SoftBody} obj - The object to add
     */
    addObject(obj) {
        this.objects.push(obj);
        if (obj instanceof RigidBody) {
            this.rigidBodies.push(obj);
        } else if (obj instanceof SoftBody) {
            this.softBodies.push(obj);
        }
    }

    /**
     * Broad phase collision detection using spatial hashing
     * Uses a simple grid-based approach for demonstration
     */
    broadPhase() {
        this.collisionPairs = [];

        // Simple AABB check between all pairs
        for (let i = 0; i < this.rigidBodies.length; i++) {
            for (let j = i + 1; j < this.rigidBodies.length; j++) {
                const a = this.rigidBodies[i];
                const b = this.rigidBodies[j];

                // Check AABB overlap
                if (a.worldAABB.max[0] < b.worldAABB.min[0] || a.worldAABB.min[0] > b.worldAABB.max[0]) continue;
                if (a.worldAABB.max[1] < b.worldAABB.min[1] || a.worldAABB.min[1] > b.worldAABB.max[1]) continue;
                if (a.worldAABB.max[2] < b.worldAABB.min[2] || a.worldAABB.min[2] > b.worldAABB.max[2]) continue;

                this.collisionPairs.push([a, b]);
            }
        }

        // Also check soft bodies against rigid bodies
        for (const soft of this.softBodies) {
            for (const rigid of this.rigidBodies) {
                // Check AABB overlap
                if (soft.worldAABB.max[0] < rigid.worldAABB.min[0] || soft.worldAABB.min[0] > rigid.worldAABB.max[0]) continue;
                if (soft.worldAABB.max[1] < rigid.worldAABB.min[1] || soft.worldAABB.min[1] > rigid.worldAABB.max[1]) continue;
                if (soft.worldAABB.max[2] < rigid.worldAABB.min[2] || soft.worldAABB.min[2] > rigid.worldAABB.max[2]) continue;

                this.collisionPairs.push([soft, rigid]);
            }
        }
    }

    /**
     * Narrow phase collision detection using GJK
     */
    narrowPhase() {
        const contacts = [];

        for (const [a, b] of this.collisionPairs) {
            if (a.fixed && b.fixed) continue;

            // For rigid-rigid collisions
            if (a instanceof RigidBody && b instanceof RigidBody) {
                const result = MathUtils.gjk.collide(
                    a.shape,
                    b.shape,
                    a.transformMatrix,
                    b.transformMatrix
                );

                if (result.colliding) {
                    // Use EPA to get penetration depth
                    const penetration = MathUtils.epa.getPenetration(
                        a.shape,
                        b.shape,
                        result.simplex,
                        a.transformMatrix,
                        b.transformMatrix
                    );

                    contacts.push({
                        a, b,
                        normal: penetration.normal,
                        depth: penetration.depth,
                        type: 'rigid-rigid'
                    });
                }
            }
            // For soft-rigid collisions (simplified)
            else if ((a instanceof SoftBody && b instanceof RigidBody) ||
                     (a instanceof RigidBody && b instanceof SoftBody)) {
                const soft = a instanceof SoftBody ? a : b;
                const rigid = a instanceof RigidBody ? a : b;

                // Simple sphere approximation for soft body
                let center = MathUtils.vec3.create();
                for (const v of soft.vertices) {
                    center[0] += v[0];
                    center[1] += v[1];
                    center[2] += v[2];
                }
                center = MathUtils.vec3.scale(center, 1 / soft.vertices.length);

                // Check distance from center to rigid body
                const dist = MathUtils.vec3.dist(center, rigid.position);
                const radius = 0.5; // Approximate radius

                if (dist < radius + 0.5) {
                    const normal = MathUtils.vec3.norm(MathUtils.vec3.sub(center, rigid.position));
                    const depth = radius + 0.5 - dist;

                    contacts.push({
                        a: soft,
                        b: rigid,
                        normal: normal,
                        depth: depth,
                        type: 'soft-rigid'
                    });
                }
            }
        }

        return contacts;
    }

    /**
     * Resolve collisions
     * @param {Array} contacts - Array of collision contacts
     */
    resolveCollisions(contacts) {
        for (const contact of contacts) {
            const { a, b, normal, depth, type } = contact;

            if (type === 'rigid-rigid') {
                this.resolveRigidRigidCollision(a, b, normal, depth);
            } else if (type === 'soft-rigid') {
                this.resolveSoftRigidCollision(a, b, normal, depth);
            }
        }
    }

    /**
     * Resolve collision between two rigid bodies
     */
    resolveRigidRigidCollision(a, b, normal, depth) {
        // Skip if either body is fixed and we're not handling fixed-fixed collisions
        if ((a.fixed && b.fixed) || depth <= 0) return;

        // Relative position of contact point
        const contactPointA = MathUtils.vec3.add(
            a.position,
            MathUtils.vec3.scale(normal, -a.shape.localAABB.max[0])
        );
        const contactPointB = MathUtils.vec3.add(
            b.position,
            MathUtils.vec3.scale(normal, b.shape.localAABB.max[0])
        );

        // Relative velocity
        const rv = MathUtils.vec3.sub(b.velocity, a.velocity);

        // Velocity along normal
        const velAlongNormal = MathUtils.vec3.dot(rv, normal);

        // Don't resolve if objects are moving away
        if (velAlongNormal > 0) return;

        // Calculate restitution
        const e = Math.min(a.restitution, b.restitution);

        // Calculate impulse scalar
        const j = -(1 + e) * velAlongNormal;
        const jT = j / (a.invMass + b.invMass);

        // Impulse vector
        const impulse = MathUtils.vec3.scale(normal, jT);

        // Apply impulse
        a.applyImpulse(MathUtils.vec3.neg(impulse), contactPointA);
        b.applyImpulse(impulse, contactPointB);

        // Positional correction to prevent sinking
        const percent = 0.2; // Usually 20% to 80%
        const correction = MathUtils.vec3.scale(normal, depth * percent);

        if (!a.fixed) {
            a.position = MathUtils.vec3.sub(a.position, MathUtils.vec3.scale(correction, a.invMass));
        }
        if (!b.fixed) {
            b.position = MathUtils.vec3.add(b.position, MathUtils.vec3.scale(correction, b.invMass));
        }

        // Add particles at collision point
        if (CONFIG.showParticles && Math.random() < CONFIG.particleMultiplier) {
            const point = MathUtils.vec3.add(
                a.position,
                MathUtils.vec3.scale(normal, -a.shape.localAABB.max[0] * 0.5)
            );
            particleSystem.addParticle(point, [1, 0.8, 0.5], 0.5);
        }
    }

    /**
     * Resolve collision between soft and rigid body (simplified)
     */
    resolveSoftRigidCollision(soft, rigid, normal, depth) {
        if (rigid.fixed && depth <= 0) return;

        // For each vertex in the soft body, check if it's penetrating
        for (let i = 0; i < soft.vertices.length; i++) {
            const v = soft.vertices[i];
            const dist = MathUtils.vec3.dot(
                MathUtils.vec3.sub(v, rigid.position),
                normal
            ) - rigid.shape.localAABB.max[0];

            if (dist < 0) {
                // Vertex is penetrating, apply correction
                const correction = MathUtils.vec3.scale(normal, -dist * 0.5);
                soft.vertices[i] = MathUtils.vec3.add(v, correction);

                // Apply velocity correction
                const velAlongNormal = MathUtils.vec3.dot(soft.velocities[i], normal);
                if (velAlongNormal < 0) {
                    const restitution = 0.3;
                    const j = -(1 + restitution) * velAlongNormal;
                    soft.velocities[i] = MathUtils.vec3.add(
                        soft.velocities[i],
                        MathUtils.vec3.scale(normal, j * soft.invMasses[i])
                    );
                }

                // Add particle
                if (CONFIG.showParticles && Math.random() < CONFIG.particleMultiplier * 0.5) {
                    particleSystem.addParticle(
                        MathUtils.vec3.copy(v),
                        [1, 0.6, 0.4],
                        0.3
                    );
                }
            }
        }
    }

    /**
     * Update the physics world
     * @param {number} dt - Time step
     */
    update(dt) {
        // Update all objects
        for (const obj of this.objects) {
            obj.update(dt * CONFIG.speed);
        }

        // Broad phase collision detection
        this.broadPhase();

        // Narrow phase collision detection
        const contacts = this.narrowPhase();

        // Resolve collisions
        this.resolveCollisions(contacts);

        // Update time
        this.time += dt;
    }

    /**
     * Reset the world
     */
    reset() {
        this.objects = [];
        this.rigidBodies = [];
        this.softBodies = [];
        this.collisionPairs = [];
        this.time = 0;
    }
}

// =============================================
// PARTICLE SYSTEM
// =============================================
// Simple particle system for impact effects

class ParticleSystem {
    constructor() {
        this.particles = [];
        this.maxParticles = 1000;
    }

    /**
     * Add a particle
     * @param {Float32Array} position - Particle position
     * @param {Array} color - Particle color [r, g, b]
     * @param {number} life - Particle lifetime in seconds
     */
    addParticle(position, color, life) {
        if (this.particles.length >= this.maxParticles) return;

        this.particles.push({
            position: MathUtils.vec3.copy(position),
            velocity: MathUtils.vec3.create(
                (Math.random() - 0.5) * 2,
                (Math.random() - 0.5) * 2,
                (Math.random() - 0.5) * 2
            ),
            color: color,
            life: life,
            maxLife: life,
            size: MathUtils.randomRange(0.02, 0.05)
        });
    }

    /**
     * Update particles
     * @param {number} dt - Time step
     */
    update(dt) {
        for (let i = this.particles.length - 1; i >= 0; i--) {
            const p = this.particles[i];
            p.life -= dt;

            if (p.life <= 0) {
                this.particles.splice(i, 1);
                continue;
            }

            // Update position
            p.position[0] += p.velocity[0] * dt;
            p.position[1] += p.velocity[1] * dt;
            p.position[2] += p.velocity[2] * dt;

            // Apply gravity
            p.velocity[1] += CONFIG.gravity * dt * 0.5;

            // Apply damping
            p.velocity = MathUtils.vec3.scale(p.velocity, 0.98);
        }
    }

    /**
     * Get particle vertices for rendering
     * @returns {Float32Array} Vertex data for all particles
     */
    getVertices() {
        const vertices = new Float32Array(this.particles.length * 6);

        for (let i = 0, j = 0; i < this.particles.length; i++, j += 6) {
            const p = this.particles[i];
            const alpha = p.life / p.maxLife;

            vertices[j] = p.position[0];
            vertices[j+1] = p.position[1];
            vertices[j+2] = p.position[2];
            vertices[j+3] = p.color[0] * alpha;
            vertices[j+4] = p.color[1] * alpha;
            vertices[j+5] = p.color[2] * alpha;
        }

        return vertices;
    }
}

// =============================================
// CAMERA SYSTEM
// =============================================
// Orbit camera with mouse controls

class OrbitCamera {
    /**
     * Create an orbit camera
     * @param {Float32Array} position - Initial camera position
     * @param {Float32Array} target - Initial camera target
     * @param {Float32Array} up - Up vector
     */
    constructor(position = MathUtils.vec3.create(0, 5, 10),
                target = MathUtils.vec3.create(0, 0, 0),
                up = MathUtils.vec3.create(0, 1, 0)) {
        this.position = MathUtils.vec3.copy(position);
        this.target = MathUtils.vec3.copy(target);
        this.up = MathUtils.vec3.copy(up);
        this.fov = 45;
        this.near = 0.1;
        this.far = 1000;
        this.sensitivity = 0.005;

        // Mouse state
        this.isDragging = false;
        this.lastMousePos = [0, 0];
        this.isApplyingForce = false;
        this.dragStart = null;
        this.forceDirection = MathUtils.vec3.create();

        // Calculate initial camera vectors
        this.updateVectors();
    }

    /**
     * Update camera vectors
     */
    updateVectors() {
        this.forward = MathUtils.vec3.norm(MathUtils.vec3.sub(this.target, this.position));
        this.right = MathUtils.vec3.norm(MathUtils.vec3.cross(this.up, this.forward));
        this.up = MathUtils.vec3.norm(MathUtils.vec3.cross(this.forward, this.right));
    }

    /**
     * Get view matrix
     * @returns {Float32Array} View matrix
     */
    getViewMatrix() {
        return MathUtils.mat4.lookAt(
            this.position,
            this.target,
            this.up
        );
    }

    /**
     * Get projection matrix
     * @returns {Float32Array} Projection matrix
     */
    getProjectionMatrix() {
        return MathUtils.mat4.perspective(
            this.fov,
            CANVAS_SIZE.width / CANVAS_SIZE.height,
            this.near,
            this.far
        );
    }

    /**
     * Handle mouse down event
     * @param {MouseEvent} e - Mouse event
     */
    onMouseDown(e) {
        this.isDragging = true;
        this.lastMousePos = [e.clientX, e.clientY];

        if (e.button === 2) { // Right click
            this.isApplyingForce = true;
            this.dragStart = [e.clientX, e.clientY];
            this.forceDirection = MathUtils.vec3.create();
        }
    }

    /**
     * Handle mouse up event
     * @param {MouseEvent} e - Mouse event
     */
    onMouseUp(e) {
        this.isDragging = false;

        if (e.button === 2) {
            this.isApplyingForce = false;
            this.dragStart = null;

            // Apply force to objects under the mouse
            if (this.lastMousePos) {
                const dx = e.clientX - this.dragStart[0];
                const dy = e.clientY - this.dragStart[1];

                // Calculate force magnitude
                const forceMagnitude = Math.sqrt(dx*dx + dy*dy) * 0.01;

                // Get ray from camera
                const ray = this.getMouseRay(e.clientX, e.clientY);

                // Find closest object
                let closestObj = null;
                let closestDist = Infinity;

                for (const obj of world.objects) {
                    if (obj.fixed) continue;

                    // Simple sphere intersection
                    const center = obj.position;
                    const radius = obj.shape ? obj.shape.localAABB.max[0] * 1.5 : 0.5;

                    // Ray-sphere intersection
                    const oc = MathUtils.vec3.sub(this.position, center);
                    const a = MathUtils.vec3.dot(ray, ray);
                    const b = 2 * MathUtils.vec3.dot(oc, ray);
                    const c = MathUtils.vec3.dot(oc, oc) - radius*radius;
                    const discriminant = b*b - 4*a*c;

                    if (discriminant >= 0) {
                        const t = (-b - Math.sqrt(discriminant)) / (2*a);
                        if (t > 0 && t < closestDist) {
                            closestDist = t;
                            closestObj = obj;
                        }
                    }
                }

                if (closestObj) {
                    // Apply force
                    const forceDir = MathUtils.vec3.norm([
                        dx * 0.01,
                        -dy * 0.01,
                        0
                    ]);

                    const force = MathUtils.vec3.scale(forceDir, forceMagnitude * 10);

                    if (closestObj instanceof RigidBody) {
                        const impactPoint = MathUtils.vec3.add(
                            this.position,
                            MathUtils.vec3.scale(ray, closestDist)
                        );
                        closestObj.applyForce(force, impactPoint);

                        // Add particles
                        if (CONFIG.showParticles) {
                            particleSystem.addParticle(impactPoint, [1, 0.8, 0.5], 0.5);
                        }
                    } else if (closestObj instanceof SoftBody) {
                        // Apply force to all vertices
                        for (let i = 0; i < closestObj.vertices.length; i++) {
                            closestObj.applyForce(i, MathUtils.vec3.scale(force, 0.1));
                        }
                    }
                }
            }
        }
    }

    /**
     * Handle mouse move event
     * @param {MouseEvent} e - Mouse event
     */
    onMouseMove(e) {
        if (this.isDragging) {
            const dx = e.clientX - this.lastMousePos[0];
            const dy = e.clientY - this.lastMousePos[1];

            // Rotate camera around target
            const right = MathUtils.vec3.norm(MathUtils.vec3.cross(this.up, this.forward));

            // Rotate up vector around right
            const newUp = MathUtils.vec3.add(
                this.up,
                MathUtils.vec3.scale(right, dy * this.sensitivity)
            );

            // Rotate position around up
            const newPos = MathUtils.vec3.add(
                this.position,
                MathUtils.vec3.scale(
                    MathUtils.vec3.cross(this.up, this.forward),
                    dx * this.sensitivity
                )
            );

            this.position = newPos;
            this.up = newUp;

            this.updateVectors();
            this.lastMousePos = [e.clientX, e.clientY];
        }

        if (this.isApplyingForce && this.dragStart) {
            const dx = e.clientX - this.dragStart[0];
            const dy = e.clientY - this.dragStart[1];

            this.forceDirection = MathUtils.vec3.create(dx * 0.01, -dy * 0.01, 0);
        }
    }

    /**
     * Handle mouse wheel event
     * @param {WheelEvent} e - Wheel event
     */
    onWheel(e) {
        // Zoom camera
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        const dir = MathUtils.vec3.norm(MathUtils.vec3.sub(this.position, this.target));

        this.position = MathUtils.vec3.add(
            this.target,
            MathUtils.vec3.scale(dir, MathUtils.vec3.len(dir) * delta)
        );

        this.updateVectors();
    }

    /**
     * Handle key down event
     * @param {KeyboardEvent} e - Keyboard event
     */
    onKeyDown(e) {
        const moveSpeed = 0.2;

        switch (e.key) {
            case 'w':
                // Move forward
                this.position = MathUtils.vec3.add(
                    this.position,
                    MathUtils.vec3.scale(this.forward, moveSpeed)
                );
                this.target = MathUtils.vec3.add(
                    this.target,
                    MathUtils.vec3.scale(this.forward, moveSpeed)
                );
                break;
            case 's':
                // Move backward
                this.position = MathUtils.vec3.sub(
                    this.position,
                    MathUtils.vec3.scale(this.forward, moveSpeed)
                );
                this.target = MathUtils.vec3.sub(
                    this.target,
                    MathUtils.vec3.scale(this.forward, moveSpeed)
                );
                break;
            case 'a':
                // Move left
                this.position = MathUtils.vec3.sub(
                    this.position,
                    MathUtils.vec3.scale(this.right, moveSpeed)
                );
                this.target = MathUtils.vec3.sub(
                    this.target,
                    MathUtils.vec3.scale(this.right, moveSpeed)
                );
                break;
            case 'd':
                // Move right
                this.position = MathUtils.vec3.add(
                    this.position,
                    MathUtils.vec3.scale(this.right, moveSpeed)
                );
                this.target = MathUtils.vec3.add(
                    this.target,
                    MathUtils.vec3.scale(this.right, moveSpeed)
                );
                break;
            case 'r':
                // Reset view
                this.position = MathUtils.vec3.create(0, 5, 10);
                this.target = MathUtils.vec3.create(0, 0, 0);
                this.up = MathUtils.vec3.create(0, 1, 0);
                this.updateVectors();
                break;
        }
    }

    /**
     * Get ray from camera through mouse position
     * @param {number} x - Mouse x coordinate
     * @param {number} y - Mouse y coordinate
     * @returns {Float32Array} Ray direction
     */
    getMouseRay(x, y) {
        // Convert mouse coordinates to normalized device coordinates
        const ndcX = (x / CANVAS_SIZE.width) * 2 - 1;
        const ndcY = -(y / CANVAS_SIZE.height) * 2 + 1;

        // Create ray in clip space
        const rayClip = new Float32Array([ndcX, ndcY, -1, 1]);

        // Inverse projection matrix
        const proj = this.getProjectionMatrix();
        const invProj = MathUtils.mat4.inverse(proj);

        // Transform to eye space
        const rayEye = new Float32Array(4);
        for (let i = 0; i < 4; i++) {
            for (let j = 0; j < 4; j++) {
                rayEye[i] += invProj[i*4 + j] * rayClip[j];
            }
        }

        // Normalize
        const rayEye3 = MathUtils.vec3.norm(new Float32Array([rayEye[0], rayEye[1], rayEye[2]]));

        // Inverse view matrix
        const view = this.getViewMatrix();
        const invView = MathUtils.mat4.inverse(view);

        // Transform to world space
        const rayWorld = new Float32Array(3);
        for (let i = 0; i < 3; i++) {
            for (let j = 0; j < 3; j++) {
                rayWorld[i] += invView[i*4 + j] * rayEye3[j];
            }
        }

        return MathUtils.vec3.norm(rayWorld);
    }
}

// =============================================
// RENDERING SYSTEM
// =============================================
// WebGL2 rendering with:
// - Phong/Blinn-Phong lighting
// - Vertex and fragment shaders
// - VAO and buffer management

let shaderProgram, vao, vertexBuffer, indexBuffer;
let particleProgram, particleVao, particleBuffer;
let modelUniform, viewUniform, projectionUniform;
let lightPosUniform, lightColorUniform, lightIntensityUniform;
let ambientUniform, viewPosUniform, colorUniform;
let wireframeUniform, useVertexColorUniform;
let particlePointSizeUniform;

function initWebGL() {
    canvas = document.getElementById('glCanvas');
    CANVAS_SIZE.width = window.innerWidth;
    CANVAS_SIZE.height = window.innerHeight;
    canvas.width = CANVAS_SIZE.width;
    canvas.height = CANVAS_SIZE.height;

    // Try to get WebGL2 context
    gl = canvas.getContext('webgl2', {
        antialias: true,
        alpha: false,
        powerPreference: 'high-performance'
    });

    if (!gl) {
        alert('WebGL2 not supported in your browser. Try Chrome, Firefox, or Edge.');
        return false;
    }

    // Enable depth testing and other features
    gl.enable(gl.DEPTH_TEST);
    gl.enable(gl.CULL_FACE);
    gl.cullFace(gl.BACK);
    gl.clearColor(CONFIG.bgColor[0], CONFIG.bgColor[1], CONFIG.bgColor[2], 1.0);
    gl.depthFunc(gl.LEQUAL);

    // Set viewport
    gl.viewport(0, 0, CANVAS_SIZE.width, CANVAS_SIZE.height);

    return true;
}

function initShaders() {
    // =========================================
    // MAIN SHADER (Phong/Blinn-Phong Lighting)
    // =========================================
    const vsSource = `#version 300 es
        precision highp float;

        in vec3 aPosition;
        in vec3 aNormal;
        in vec2 aTexCoord;

        uniform mat4 uModel;
        uniform mat4 uView;
        uniform mat4 uProjection;

        uniform vec3 uLightPosition;

        out vec3 vNormal;
        out vec3 vPosition;
        out vec2 vTexCoord;
        out vec3 vLightDir;
        out vec3 vViewDir;

        void main() {
            vPosition = vec3(uModel * vec4(aPosition, 1.0));
            vNormal = mat3(transpose(inverse(uModel))) * aNormal;
            vTexCoord = aTexCoord;

            vec3 lightPos = uLightPosition;
            vLightDir = lightPos - vPosition;
            vViewDir = -vPosition; // View position is at origin in view space

            gl_Position = uProjection * uView * uModel * vec4(aPosition, 1.0);
        }
    `;

    const fsSource = `#version 300 es
        precision highp float;

        in vec3 vNormal;
        in vec3 vPosition;
        in vec2 vTexCoord;
        in vec3 vLightDir;
        in vec3 vViewDir;

        uniform vec3 uLightColor;
        uniform float uLightIntensity;
        uniform vec3 uAmbient;
        uniform vec3 uColor;
        uniform bool uWireframe;
        uniform bool uUseVertexColor;

        out vec4 fragColor;

        void main() {
            if (uWireframe) {
                fragColor = vec4(uColor, 1.0);
                return;
            }

            // Normalize vectors
            vec3 normal = normalize(vNormal);
            vec3 lightDir = normalize(vLightDir);
            vec3 viewDir = normalize(vViewDir);

            // Ambient
            vec3 ambient = uAmbient * uLightColor * uLightIntensity;

            // Diffuse
            float diff = max(dot(normal, lightDir), 0.0);
            vec3 diffuse = diff * uLightColor * uLightIntensity;

            // Specular (Blinn-Phong)
            vec3 halfwayDir = normalize(lightDir + viewDir);
            float spec = pow(max(dot(normal, halfwayDir), 0.0), 30.0);
            vec3 specular = spec * uLightColor * uLightIntensity;

            vec3 result = (ambient + diffuse + specular) * uColor;
            fragColor = vec4(result, 1.0);
        }
    `;

    // =========================================
    // PARTICLE SHADER (Simple colored points)
    // =========================================
    const particleVsSource = `#version 300 es
        precision highp float;

        in vec3 aPosition;
        in vec3 aColor;

        uniform mat4 uView;
        uniform mat4 uProjection;
        uniform float uPointSize;

        out vec3 vColor;

        void main() {
            vColor = aColor;
            gl_Position = uProjection * uView * vec4(aPosition, 1.0);
            gl_PointSize = uPointSize;
        }
    `;

    const particleFsSource = `#version 300 es
        precision highp float;

        in vec3 vColor;

        out vec4 fragColor;

        void main() {
            // Create a circular point
            vec2 coord = gl_PointCoord - vec2(0.5);
            float dist = dot(coord, coord);
            if (dist > 0.25) discard;

            fragColor = vec4(vColor, 1.0);
        }
    `;

    // Compile shader
    function compileShader(gl, source, type) {
        const shader = gl.createShader(type);
        gl.shaderSource(shader, source);
        gl.compileShader(shader);

        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
            console.error('Shader compilation error:', gl.getShaderInfoLog(shader));
            gl.deleteShader(shader);
            return null;
        }

        return shader;
    }

    // Create main shader program
    const vertexShader = compileShader(gl, vsSource, gl.VERTEX_SHADER);
    const fragmentShader = compileShader(gl, fsSource, gl.FRAGMENT_SHADER);

    shaderProgram = gl.createProgram();
    gl.attachShader(shaderProgram, vertexShader);
    gl.attachShader(shaderProgram, fragmentShader);
    gl.linkProgram(shaderProgram);

    if (!gl.getProgramParameter(shaderProgram, gl.LINK_STATUS)) {
        console.error('Shader program linking error:', gl.getProgramInfoLog(shaderProgram));
        return false;
    }

    // Get attribute and uniform locations for main shader
    const positionAttribute = gl.getAttribLocation(shaderProgram, 'aPosition');
    const normalAttribute = gl.getAttribLocation(shaderProgram, 'aNormal');
    const texCoordAttribute = gl.getAttribLocation(shaderProgram, 'aTexCoord');

    modelUniform = gl.getUniformLocation(shaderProgram, 'uModel');
    viewUniform = gl.getUniformLocation(shaderProgram, 'uView');
    projectionUniform = gl.getUniformLocation(shaderProgram, 'uProjection');
    lightPosUniform = gl.getUniformLocation(shaderProgram, 'uLightPosition');
    lightColorUniform = gl.getUniformLocation(shaderProgram, 'uLightColor');
    lightIntensityUniform = gl.getUniformLocation(shaderProgram, 'uLightIntensity');
    ambientUniform = gl.getUniformLocation(shaderProgram, 'uAmbient');
    viewPosUniform = gl.getUniformLocation(shaderProgram, 'uViewPosition');
    colorUniform = gl.getUniformLocation(shaderProgram, 'uColor');
    wireframeUniform = gl.getUniformLocation(shaderProgram, 'uWireframe');
    useVertexColorUniform = gl.getUniformLocation(shaderProgram, 'uUseVertexColor');

    // Create VAO
    vao = gl.createVertexArray();
    gl.bindVertexArray(vao);

    // Create vertex buffer
    vertexBuffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, vertexBuffer);

    // Set attribute pointers
    gl.enableVertexAttribArray(positionAttribute);
    gl.vertexAttribPointer(positionAttribute, 3, gl.FLOAT, false, 8 * 4, 0);

    gl.enableVertexAttribArray(normalAttribute);
    gl.vertexAttribPointer(normalAttribute, 3, gl.FLOAT, false, 8 * 4, 3 * 4);

    gl.enableVertexAttribArray(texCoordAttribute);
    gl.vertexAttribPointer(texCoordAttribute, 2, gl.FLOAT, false, 8 * 4, 6 * 4);

    // Create index buffer
    indexBuffer = gl.createBuffer();
    gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, indexBuffer);

    // Unbind VAO
    gl.bindVertexArray(null);

    // Create particle shader program
    const particleVertexShader = compileShader(gl, particleVsSource, gl.VERTEX_SHADER);
    const particleFragmentShader = compileShader(gl, particleFsSource, gl.FRAGMENT_SHADER);

    particleProgram = gl.createProgram();
    gl.attachShader(particleProgram, particleVertexShader);
    gl.attachShader(particleProgram, particleFragmentShader);
    gl.linkProgram(particleProgram);

    if (!gl.getProgramParameter(particleProgram, gl.LINK_STATUS)) {
        console.error('Particle shader program linking error:', gl.getProgramInfoLog(particleProgram));
        return false;
    }

    // Get attribute and uniform locations for particle shader
    const particlePositionAttribute = gl.getAttribLocation(particleProgram, 'aPosition');
    const particleColorAttribute = gl.getAttribLocation(particleProgram, 'aColor');

    const particleViewUniform = gl.getUniformLocation(particleProgram, 'uView');
    const particleProjectionUniform = gl.getUniformLocation(particleProgram, 'uProjection');
    particlePointSizeUniform = gl.getUniformLocation(particleProgram, 'uPointSize');

    // Create particle VAO
    particleVao = gl.createVertexArray();
    gl.bindVertexArray(particleVao);

    // Create particle buffer
    particleBuffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, particleBuffer);

    // Set attribute pointers
    gl.enableVertexAttribArray(particlePositionAttribute);
    gl.vertexAttribPointer(particlePositionAttribute, 3, gl.FLOAT, false, 6 * 4, 0);

    gl.enableVertexAttribArray(particleColorAttribute);
    gl.vertexAttribPointer(particleColorAttribute, 3, gl.FLOAT, false, 6 * 4, 3 * 4);

    // Unbind particle VAO
    gl.bindVertexArray(null);

    // Store uniform locations for later use
    window.particleViewUniform = particleViewUniform;
    window.particleProjectionUniform = particleProjectionUniform;

    return true;
}

function updateBuffers(vertices, indices) {
    gl.bindVertexArray(vao);

    gl.bindBuffer(gl.ARRAY_BUFFER, vertexBuffer);
    gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.DYNAMIC_DRAW);

    gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, indexBuffer);
    gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, indices, gl.DYNAMIC_DRAW);

    gl.bindVertexArray(null);
}

function renderObject(obj) {
    // Use main shader program
    gl.useProgram(shaderProgram);

    // Set uniforms
    const modelMatrix = obj.getTransformMatrix ? obj.getTransformMatrix() : MathUtils.mat4.identity();
    gl.uniformMatrix4fv(modelUniform, false, modelMatrix);

    const viewMatrix = camera.getViewMatrix();
    gl.uniformMatrix4fv(viewUniform, false, viewMatrix);

    const projectionMatrix = camera.getProjectionMatrix();
    gl.uniformMatrix4fv(projectionUniform, false, projectionMatrix);

    // Light properties
    const lightPos = [10, 20, 10];
    gl.uniform3fv(lightPosUniform, lightPos);
    gl.uniform3fv(lightColorUniform, CONFIG.lightColor);
    gl.uniform1f(lightIntensityUniform, CONFIG.lightIntensity);
    gl.uniform3fv(ambientUniform, CONFIG.ambient);

    // Camera position (for specular)
    gl.uniform3fv(viewPosUniform, camera.position);

    // Object color
    gl.uniform3fv(colorUniform, obj.color || [1, 1, 1]);

    // Wireframe mode
    gl.uniform1i(wireframeUniform, CONFIG.wireframe);

    // Use vertex color (not used in this shader, but for compatibility)
    gl.uniform1i(useVertexColorUniform, 0);

    // Update buffers with object's vertices
    let vertices, indices;
    if (obj instanceof SoftBody) {
        vertices = obj.getTransformedVertices();
        indices = obj.indices;
    } else {
        vertices = obj.shape.vertices;
        indices = obj.shape.indices;
    }

    updateBuffers(vertices, indices);

    // Draw
    gl.bindVertexArray(vao);
    gl.drawElements(
        gl.TRIANGLES,
        indices.length,
        gl.UNSIGNED_SHORT,
        0
    );
    gl.bindVertexArray(null);
}

function renderParticles() {
    if (!CONFIG.showParticles || particleSystem.particles.length === 0) return;

    // Use particle shader program
    gl.useProgram(particleProgram);

    // Set uniforms
    const viewMatrix = camera.getViewMatrix();
    gl.uniformMatrix4fv(window.particleViewUniform, false, viewMatrix);

    const projectionMatrix = camera.getProjectionMatrix();
    gl.uniformMatrix4fv(window.particleProjectionUniform, false, projectionMatrix);

    // Point size
    gl.uniform1f(particlePointSizeUniform, 8);

    // Update particle buffer
    const particleVertices = particleSystem.getVertices();
    gl.bindVertexArray(particleVao);
    gl.bindBuffer(gl.ARRAY_BUFFER, particleBuffer);
    gl.bufferData(gl.ARRAY_BUFFER, particleVertices, gl.DYNAMIC_DRAW);

    // Draw particles
    gl.drawArrays(gl.POINTS, 0, particleSystem.particles.length);
    gl.bindVertexArray(null);
}

function renderAABB(obj) {
    if (!CONFIG.showAABB) return;

    // Simple AABB rendering as wireframe
    const aabb = obj.worldAABB;
    const vertices = new Float32Array([
        // Front face
        aabb.min[0], aabb.min[1], aabb.max[2],
        aabb.max[0], aabb.min[1], aabb.max[2],
        aabb.max[0], aabb.max[1], aabb.max[2],
        aabb.min[0], aabb.max[1], aabb.max[2],

        // Back face
        aabb.min[0], aabb.min[1], aabb.min[2],
        aabb.max[0], aabb.min[1], aabb.min[2],
        aabb.max[0], aabb.max[1], aabb.min[2],
        aabb.min[0], aabb.max[1], aabb.min[2]
    ]);

    const indices = new Uint16Array([
        0, 1, 1, 2, 2, 3, 3, 0, // Front
        4, 5, 5, 6, 6, 7, 7, 4, // Back
        0, 4, 1, 5, 2, 6, 3, 7  // Connecting lines
    ]);

    // Use main shader
    gl.useProgram(shaderProgram);

    // Set uniforms
    const modelMatrix = MathUtils.mat4.identity();
    gl.uniformMatrix4fv(modelUniform, false, modelMatrix);

    const viewMatrix = camera.getViewMatrix();
    gl.uniformMatrix4fv(viewUniform, false, viewMatrix);

    const projectionMatrix = camera.getProjectionMatrix();
    gl.uniformMatrix4fv(projectionUniform, false, projectionMatrix);

    gl.uniform3fv(colorUniform, [0.5, 0.5, 1.0]);
    gl.uniform1i(wireframeUniform, 1);

    // Update buffers
    gl.bindVertexArray(vao);

    // Create temporary vertex buffer for AABB
    const tempVertexBuffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, tempVertexBuffer);
    gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.DYNAMIC_DRAW);

    const positionAttribute = gl.getAttribLocation(shaderProgram, 'aPosition');
    gl.enableVertexAttribArray(positionAttribute);
    gl.vertexAttribPointer(positionAttribute, 3, gl.FLOAT, false, 0, 0);

    // Create temporary index buffer for AABB
    const tempIndexBuffer = gl.createBuffer();
    gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, tempIndexBuffer);
    gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, indices, gl.DYNAMIC_DRAW);

    // Draw
    gl.drawElements(gl.LINES, indices.length, gl.UNSIGNED_SHORT, 0);

    // Clean up
    gl.deleteBuffer(tempVertexBuffer);
    gl.deleteBuffer(tempIndexBuffer);
    gl.bindVertexArray(null);
}

function renderScene() {
    // Clear canvas
    gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

    // Render all objects
    for (const obj of world.objects) {
        renderObject(obj);

        // Render AABB if enabled
        if (CONFIG.showAABB) {
            renderAABB(obj);
        }
    }

    // Render particles
    renderParticles();
}

// =============================================
// SCENE SETUP & PRESETS
// =============================================
// Functions to create different simulation scenarios

function createGround() {
    const ground = Geometry.createCube(20, 0.2, 20);
    const groundBody = new RigidBody(
        new Shape(ground),
        [0, -1, 0],
        0, // Infinite mass (fixed)
        true
    );
    groundBody.color = [0.2, 0.2, 0.25];
    return groundBody;
}

function createStack() {
    const ground = createGround();
    world.addObject(ground);

    // Create a stack of cubes
    for (let i = 0; i < 8; i++) {
        const cube = Geometry.createCube(0.6);
        const body = new RigidBody(
            new Shape(cube),
            [0, i * 0.65 + 0.3, 0],
            1 + Math.random() * 0.5
        );
        body.color = [
            MathUtils.randomRange(0.4, 0.8),
            MathUtils.randomRange(0.4, 0.8),
            MathUtils.randomRange(0.4, 0.8)
        ];
        body.restitution = MathUtils.randomRange(0.4, 0.7);
        world.addObject(body);
    }

    // Add some offset cubes
    for (let i = 0; i < 4; i++) {
        const cube = Geometry.createCube(0.4);
        const body = new RigidBody(
            new Shape(cube),
            [(i % 2 === 0 ? -0.8 : 0.8), 1.5 + i * 0.5, 0],
            0.5 + Math.random() * 0.3
        );
        body.color = [
            MathUtils.randomRange(0.6, 0.9),
            MathUtils.randomRange(0.3, 0.6),
            MathUtils.randomRange(0.3, 0.6)
        ];
        world.addObject(body);
    }
}

function createBunnyDrop() {
    const ground = createGround();
    world.addObject(ground);

    // Create Stanford Bunny
    const bunny = new Shape(Geometry.BUNNY);
    const bunnyBody = new RigidBody(
        bunny,
        [0, 8, 0],
        2
    );
    bunnyBody.color = [0.8, 0.6, 0.4];
    bunnyBody.restitution = 0.3;
    world.addObject(bunnyBody);

    // Add some cubes around
    for (let i = 0; i < 5; i++) {
        const cube = Geometry.createCube(0.5);
        const body = new RigidBody(
            new Shape(cube),
            [
                (Math.random() - 0.5) * 4,
                5 + Math.random() * 2,
                (Math.random() - 0.5) * 4
            ],
            0.8 + Math.random() * 0.4
        );
        body.color = [
            MathUtils.randomRange(0.3, 0.7),
            MathUtils.randomRange(0.3, 0.7),
            MathUtils.randomRange(0.5, 0.9)
        ];
        world.addObject(body);
    }
}

function createTetrahedralChain() {
    const ground = createGround();
    world.addObject(ground);

    // Create a chain of tetrahedrons
    for (let i = 0; i < 15; i++) {
        const tetra = Geometry.createTetrahedron(0.3);
        const body = new RigidBody(
            new Shape(tetra),
            [i * 0.4 - 2.5, 5 + Math.sin(i * 0.5) * 0.3, 0],
            0.3
        );
        body.color = [
            i / 15,
            0.5,
            1 - i / 15
        ];
        body.restitution = 0.6;
        world.addObject(body);
    }

    // Add some obstacles
    for (let i = 0; i < 3; i++) {
        const cube = Geometry.createCube(1);
        const body = new RigidBody(
            new Shape(cube),
            [i * 4 - 4, 0.5, 2],
            0, // Fixed
            true
        );
        body.color = [0.3, 0.3, 0.3];
        world.addObject(body);
    }
}

function createComplexPolyhedra() {
    const ground = createGround();
    world.addObject(ground);

    // Create a variety of polyhedra
    const shapes = [
        Geometry.createIcosahedron(0.6),
        Geometry.createTetrahedron(0.7),
        Geometry.createCube(0.5),
        Geometry.createTorus(0.5, 0.2, 16, 8)
    ];

    for (let i = 0; i < 15; i++) {
        const shape = shapes[i % shapes.length];
        const body = new RigidBody(
            new Shape(shape),
            [
                (Math.random() - 0.5) * 6,
                3 + Math.random() * 4,
                (Math.random() - 0.5) * 6
            ],
            0.5 + Math.random() * 0.5
        );
        body.color = [
            MathUtils.randomRange(0.3, 0.9),
            MathUtils.randomRange(0.3, 0.9),
            MathUtils.randomRange(0.3, 0.9)
        ];
        body.restitution = MathUtils.randomRange(0.3, 0.7);
        world.addObject(body);
    }
}

function createTorusStack() {
    const ground = createGround();
    world.addObject(ground);

    // Create a stack of tori
    for (let i = 0; i < 6; i++) {
        const torus = Geometry.createTorus(0.8 - i * 0.1, 0.2, 16, 8);
        const body = new RigidBody(
            new Shape(torus),
            [0, 1 + i * 0.4, 0],
            1 + i * 0.2
        );
        body.color = [
            MathUtils.randomRange(0.4, 0.8),
            MathUtils.randomRange(0.4, 0.8),
            MathUtils.randomRange(0.6, 0.9)
        ];
        body.restitution = 0.4 + i * 0.05;
        world.addObject(body);
    }

    // Add some cubes to the sides
    for (let i = 0; i < 4; i++) {
        const cube = Geometry.createCube(0.4);
        const body = new RigidBody(
            new Shape(cube),
            [i % 2 === 0 ? -1.5 : 1.5, 2 + Math.floor(i/2) * 0.8, 0],
            0.5
        );
        body.color = [
            MathUtils.randomRange(0.6, 0.9),
            MathUtils.randomRange(0.3, 0.6),
            MathUtils.randomRange(0.3, 0.6)
        ];
        world.addObject(body);
    }
}

function loadPreset(preset) {
    world.reset();
    particleSystem.particles = [];

    switch (preset) {
        case 'stack':
            createStack();
            break;
        case 'bunny':
            createBunnyDrop();
            break;
        case 'chain':
            createTetrahedralChain();
            break;
        case 'destruction':
            createComplexPolyhedra();
            break;
        case 'polyhedra':
            createComplexPolyhedra();
            break;
        case 'torus':
            createTorusStack();
            break;
        default:
            createStack();
    }

    // Reset camera
    camera.position = MathUtils.vec3.create(0, 5, 10);
    camera.target = MathUtils.vec3.create(0, 0, 0);
    camera.up = MathUtils.vec3.create(0, 1, 0);
    camera.updateVectors();
}

// =============================================
// UI CONTROLS
// =============================================
function initUI() {
    // Pause button
    const pauseButton = document.getElementById('pause');
    pauseButton.addEventListener('click', () => {
        CONFIG.paused = !CONFIG.paused;
        pauseButton.textContent = CONFIG.paused ? 'Play' : 'Pause';
        pauseButton.classList.toggle('active', !CONFIG.paused);
    });

    // Reset button
    const resetButton = document.getElementById('reset');
    resetButton.addEventListener('click', () => {
        loadPreset('stack');
    });

    // Wireframe button
    const wireframeButton = document.getElementById('wireframe');
    wireframeButton.addEventListener('click', () => {
        CONFIG.wireframe = !CONFIG.wireframe;
        wireframeButton.textContent = CONFIG.wireframe ? 'Solid' : 'Wireframe';
        wireframeButton.classList.toggle('active', CONFIG.wireframe);
    });

    // Gravity slider
    const gravitySlider = document.getElementById('gravity');
    const gravityValue = document.getElementById('gravityValue');
    gravitySlider.addEventListener('input', () => {
        CONFIG.gravity = parseFloat(gravitySlider.value);
        gravityValue.textContent = CONFIG.gravity.toFixed(1);
    });

    // Damping slider
    const dampingSlider = document.getElementById('damping');
    const dampingValue = document.getElementById('dampingValue');
    dampingSlider.addEventListener('input', () => {
        CONFIG.damping = parseFloat(dampingSlider.value);
        dampingValue.textContent = CONFIG.damping.toFixed(3);
    });

    // Friction slider
    const frictionSlider = document.getElementById('friction');
    const frictionValue = document.getElementById('frictionValue');
    frictionSlider.addEventListener('input', () => {
        CONFIG.friction = parseFloat(frictionSlider.value);
        frictionValue.textContent = CONFIG.friction.toFixed(2);

        // Update all objects' friction
        for (const obj of world.objects) {
            if (obj instanceof RigidBody) {
                obj.friction = CONFIG.friction;
            }
        }
    });

    // Restitution slider
    const restitutionSlider = document.getElementById('restitution');
    const restitutionValue = document.getElementById('restitutionValue');
    restitutionSlider.addEventListener('input', () => {
        CONFIG.restitution = parseFloat(restitutionSlider.value);
        restitutionValue.textContent = CONFIG.restitution.toFixed(2);

        // Update all objects' restitution
        for (const obj of world.objects) {
            if (obj instanceof RigidBody) {
                obj.restitution = CONFIG.restitution;
            }
        }
    });

    // Speed slider
    const speedSlider = document.getElementById('speed');
    const speedValue = document.getElementById('speedValue');
    speedSlider.addEventListener('input', () => {
        CONFIG.speed = parseFloat(speedSlider.value);
        speedValue.textContent = CONFIG.speed.toFixed(1);
    });

    // Preset buttons
    const presetButtons = document.querySelectorAll('.preset-btn');
    presetButtons.forEach(button => {
        button.addEventListener('click', () => {
            loadPreset(button.dataset.preset);
        });
    });
}

// =============================================
// MAIN LOOP & INITIALIZATION
// =============================================
let lastFrameTime = 0;
let fpsCounter = 0;
let fpsTime = 0;
let currentFps = 0;

function updateFPS() {
    fpsCounter++;
    const now = performance.now();

    if (now - fpsTime >= 1000) {
        currentFps = fpsCounter;
        fpsCounter = 0;
        fpsTime = now;
        document.getElementById('fps').textContent = `FPS: ${currentFps}`;
    }
}

function mainLoop(timestamp) {
    // Calculate delta time
    const dt = Math.min((timestamp - lastFrameTime) / 1000, 0.1);
    lastFrameTime = timestamp;

    // Update FPS counter
    updateFPS();

    // Update simulation if not paused
    if (!CONFIG.paused) {
        world.update(dt);

        // Update particles
        particleSystem.update(dt);
    }

    // Render scene
    renderScene();

    // Request next frame
    requestAnimationFrame(mainLoop);
}

function init() {
    // Initialize WebGL
    if (!initWebGL()) {
        return;
    }

    // Initialize shaders
    if (!initShaders()) {
        return;
    }

    // Initialize world
    world = new PhysicsWorld();

    // Initialize particle system
    particleSystem = new ParticleSystem();

    // Initialize camera
    camera = new OrbitCamera(
        MathUtils.vec3.create(0, 5, 10),
        MathUtils.vec3.create(0, 0, 0),
        MathUtils.vec3.create(0, 1, 0)
    );

    // Initialize UI
    initUI();

    // Load initial preset
    loadPreset('stack');

    // Handle window resize
    window.addEventListener('resize', () => {
        CANVAS_SIZE.width = window.innerWidth;
        CANVAS_SIZE.height = window.innerHeight;
        canvas.width = CANVAS_SIZE.width;
        canvas.height = CANVAS_SIZE.height;
        gl.viewport(0, 0, CANVAS_SIZE.width, CANVAS_SIZE.height);
    });

    // Initialize input
    canvas.addEventListener('mousedown', (e) => camera.onMouseDown(e));
    window.addEventListener('mouseup', (e) => camera.onMouseUp(e));
    window.addEventListener('mousemove', (e) => camera.onMouseMove(e));
    window.addEventListener('wheel', (e) => camera.onWheel(e));
    window.addEventListener('keydown', (e) => camera.onKeyDown(e));

    // Prevent context menu on right click
    canvas.addEventListener('contextmenu', (e) => {
        e.preventDefault();
    });

    // Start main loop
    requestAnimationFrame(mainLoop);
}

// =============================================
// START THE APPLICATION
// =============================================
window.onload = init;
</script>
