            function solveRagdollJoints() {
                if (!window.ragdollJoints) return;
                for (const joint of window.ragdollJoints) {
                    const worldAnchorA = v3Add(joint.a.position, quatRotate(joint.a.orientation, joint.anchorA));
                    const worldAnchorB = v3Add(joint.b.position, quatRotate(joint.b.orientation, joint.anchorB));
                    const delta = v3Sub(worldAnchorB, worldAnchorA);
                    const dist = v3Len(delta);
                    if (dist < EPSILON) continue;
                    const correction = (dist - joint.dist) * 0.5;
                    const dir = v3Scale(delta, 1 / dist);
                    const totalInvMass = joint.a.invMass + joint.b.invMass;
                    if (totalInvMass < EPSILON) continue;
                    const impulse = v3Scale(dir, correction / totalInvMass);
                    if (!joint.a.isStatic) joint.a.position = v3Add(joint.a.position, v3Scale(impulse, joint.a.invMass));
                    if (!joint.b.isStatic) joint.b.position = v3Sub(joint.b.position, v3Scale(impulse, joint.b.invMass));
                }
            }

            // ──────────────────────────────────────────────
            //  RAY CASTING (for mouse interaction)
            // ──────────────────────────────────────────────
            function raycastBody(rayOrigin, rayDir, body) {
                const worldVerts = body.getWorldVertices();
                const faces = body.polyData.faces;
                let closestT = Infinity;
                let closestPoint = null;
                for (const face of faces) {
                    const a = worldVerts[face[0]];
                    const b = worldVerts[face[1]];
                    const c = worldVerts[face[2]];
                    const ab = v3Sub(b, a);
                    const ac = v3Sub(c, a);
                    const n = v3Cross(ab, ac);
                    const nl = v3Len(n);
                    if (nl < EPSILON) continue;
                    const nn = v3Scale(n, 1 / nl);
                    const d = -v3Dot(nn, a);
                    const denom = v3Dot(nn, rayDir);
                    if (Math.abs(denom) < EPSILON) continue;
                    const t = -(v3Dot(nn, rayOrigin) + d) / denom;
                    if (t < 0.01 || t > closestT) continue;
                    const pt = v3Add(rayOrigin, v3Scale(rayDir, t));
                    // Check if point is inside triangle
                    const v0 = v3Sub(c, a);
                    const v1 = v3Sub(b, a);
                    const v2 = v3Sub(pt, a);
                    const dot00 = v3Dot(v0, v0);
                    const dot01 = v3Dot(v0, v1);
                    const dot02 = v3Dot(v0, v2);
                    const dot11 = v3Dot(v1, v1);
                    const dot12 = v3Dot(v1, v2);
                    const invDenom = 1 / (dot00 * dot11 - dot01 * dot01);
                    const u = (dot11 * dot02 - dot01 * dot12) * invDenom;
                    const v = (dot00 * dot12 - dot01 * dot02) * invDenom;
                    if (u >= -EPSILON && v >= -EPSILON && u + v <= 1 + EPSILON) {
                        closestT = t;
                        closestPoint = pt;
                    }
                }
                return closestPoint ? { point: closestPoint, t: closestT, body } : null;
            }

            function raycastAll(rayOrigin, rayDir) {
                let best = null;
                for (const body of rigidBodies) {
                    const hit = raycastBody(rayOrigin, rayDir, body);
                    if (hit && (best === null || hit.t < best.t)) best = hit;
                }
                return best;
            }

            // ──────────────────────────────────────────────
            //  MAIN PHYSICS STEP
            // ──────────────────────────────────────────────
            function physicsStep(dt) {
                if (paused) return;
                const subSteps = 3;
                const subDt = dt / subSteps;

                for (let s = 0; s < subSteps; s++) {
                    // Integrate rigid bodies
                    for (const body of rigidBodies) {
                        body.integrate(subDt, gravity);
                    }
                    // Simulate soft body
                    if (softBody) {
                        softBody.simulate(subDt, gravity);
                        // Soft body particles interact with rigid bodies (simple push)
                        for (const p of softBody.particles) {
                            for (const body of rigidBodies) {
                                if (body.isStatic) continue;
                                const worldVerts = body.getWorldVertices();
                                // Quick sphere check
                                const closestPt = worldVerts.reduce((best, v) => {
                                    const d = v3Dist(p.pos, v);
                                    return d < best.d ? { v, d } : best;
                                }, { v: worldVerts[0], d: Infinity });
                                const combinedRadius = p.radius + body.polyData.boundingRadius * 0.3;
                                if (closestPt.d < combinedRadius && closestPt.d > EPSILON) {
                                    const dir = v3Normalize(v3Sub(p.pos, closestPt.v));
                                    const penetration = combinedRadius - closestPt.d;
                                    p.pos = v3Add(p.pos, v3Scale(dir, penetration * 0.5));
                                    if (!body.isStatic) {
                                        body.position = v3Sub(body.position, v3Scale(dir, penetration * 0.5 * body.invMass /
                                            (body.invMass + p.invMass)));
                                    }
                                }
                            }
                        }
                    }
                    // Solve ragdoll joints
                    solveRagdollJoints();
                    // Broad phase collision detection (simple pairwise)
                    const contacts = [];
                    for (let i = 0; i < rigidBodies.length; i++) {
                        for (let j = i + 1; j < rigidBodies.length; j++) {
                            const a = rigidBodies[i];
                            const b = rigidBodies[j];
                            if (a.isStatic && b.isStatic) continue;
                            if (a.sleeping && b.sleeping) continue;
                            const dist = v3Dist(a.position, b.position);
                            const combinedRadius = a.polyData.boundingRadius + b.polyData.boundingRadius;
                            if (dist < combinedRadius * 1.1) {
                                const contact = satCollision(a, b);
                                if (contact) contacts.push(contact);
                            }
                        }
                    }
                    // Resolve collisions
                    for (const contact of contacts) {
                        const result = resolveCollision(contact);
                        if (result && particleSystem && result.depth > 0.15) {
                            const nParticles = Math.floor(result.depth * 12);
                            for (let i = 0; i < nParticles; i++) {
                                const spread = v3Add(
                                    v3Scale(result.normal, (0.5 + Math.random()) * 3),
                                    [
                                        (Math.random() - 0.5) * 4,
                                        (Math.random() - 0.5) * 4,
                                        (Math.random() - 0.5) * 4
                                    ]
                                );
                                particleSystem.emit(result.point, spread, [1, 0.75, 0.25], 0.6 + Math.random() * 1.2, 0.04 +
                                    Math.random() * 0.1);
                            }
                        }
                    }
                    // Ground collision for rigid bodies
                    for (const body of rigidBodies) {
                        if (body.isStatic || body.sleeping) continue;
                        const worldVerts = body.getWorldVertices();
                        let minY = Infinity;
                        let deepestVert = null;
                        for (const v of worldVerts) {
                            if (v[1] < minY) { minY = v[1];
                                deepestVert = v; }
                        }
                        if (minY < groundY) {
                            const penetration = groundY - minY;
                            body.position[1] += penetration;
                            if (body.velocity[1] < 0) {
                                body.velocity[1] *= -body.restitution;
                                // Friction on ground
                                body.velocity[0] *= (1 - body.friction * 0.3);
                                body.velocity[2] *= (1 - body.friction * 0.3);
                                body.angularVelocity = v3Scale(body.angularVelocity, 0.85);
                            }
                            if (particleSystem && penetration > 0.1 && v3Len(body.velocity) > 0.5) {
                                const nP = Math.floor(penetration * 8);
                                for (let i = 0; i < nP; i++) {
                                    particleSystem.emit(
                                        [deepestVert[0] + (Math.random() - 0.5) * 0.8, groundY, deepestVert[2] + (Math
                                            .random() - 0.5) * 0.8
                                        ],
                                        [(Math.random() - 0.5) * 2, Math.random() * 2.5, (Math.random() - 0.5) * 2],
                                        [0.8, 0.7, 0.5], 0.4 + Math.random() * 0.8, 0.03 + Math.random() * 0.06
                                    );
                                }
                            }
                        }
                    }
                }
                // Update particle system
                if (particleSystem) particleSystem.update(dt, gravity);
            }

            // ──────────────────────────────────────────────
            //  RENDERING
            // ──────────────────────────────────────────────
            function renderShadowPass() {
                gl.bindFramebuffer(gl.FRAMEBUFFER, shadowFBO);
                gl.viewport(0, 0, SHADOW_SIZE, SHADOW_SIZE);
                gl.clear(gl.DEPTH_BUFFER_BIT);
                gl.enable(gl.DEPTH_TEST);
                gl.depthFunc(gl.LESS);
                gl.cullFace(gl.FRONT); // Reduce peter-panning

                const lightView = m4LookAt(lightPos, lightTarget, lightUp);
                const lightProj = m4Ortho(-18, 18, -18, 18, 0.5, 70);
                const lightMVP = m4Multiply(lightProj, lightView);

                gl.useProgram(shadowProg);
                const uLightMVP = gl.getUniformLocation(shadowProg, 'uLightMVP');

                for (const body of rigidBodies) {
                    if (!body.renderMesh) continue;
                    const modelMat = m4FromQuat(body.orientation);
                    modelMat[12] = body.position[0];
                    modelMat[13] = body.position[1];
                    modelMat[14] = body.position[2];
                    const mvp = m4Multiply(lightMVP, modelMat);
                    gl.uniformMatrix4fv(uLightMVP, false, mvp);
                    gl.bindVertexArray(body.renderMesh.vao);
                    gl.drawArrays(gl.TRIANGLES, 0, body.renderMesh.vertexCount);
                }
                // Soft body shadow
                if (softBody) {
                    const renderData = softBody.getRenderVertices();
                    if (renderData.vertexCount > 0) {
                        const tempVao = createTempVAO(renderData);
                        const mvp = m4Multiply(lightMVP, m4Identity());
                        gl.uniformMatrix4fv(uLightMVP, false, mvp);
                        gl.bindVertexArray(tempVao);
                        gl.drawArrays(gl.TRIANGLES, 0, renderData.vertexCount);
                        gl.deleteVertexArray(tempVao);
                    }
                }
                gl.cullFace(gl.BACK);
                gl.bindFramebuffer(gl.FRAMEBUFFER, null);
            }

            function createTempVAO(renderData) {
                const vao = gl.createVertexArray();
                gl.bindVertexArray(vao);
                const interleaved = [];
                for (let i = 0; i < renderData.positions.length / 3; i++) {
                    interleaved.push(
                        renderData.positions[i * 3], renderData.positions[i * 3 + 1], renderData.positions[i * 3 + 2],
                        renderData.normals[i * 3], renderData.normals[i * 3 + 1], renderData.normals[i * 3 + 2]
                    );
                }
                const vbo = gl.createBuffer();
                gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
                gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(interleaved), gl.DYNAMIC_DRAW);
                gl.enableVertexAttribArray(0);
                gl.vertexAttribPointer(0, 3, gl.FLOAT, false, 24, 0);
                gl.enableVertexAttribArray(1);
                gl.vertexAttribPointer(1, 3, gl.FLOAT, false, 24, 12);
                gl.bindVertexArray(null);
                vao.vertexCount = renderData.vertexCount;
                return vao;
            }

            function renderMainPass(aspect) {
                gl.viewport(0, 0, canvas.width, canvas.height);
                gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
                gl.enable(gl.DEPTH_TEST);
                gl.depthFunc(gl.LESS);
                gl.enable(gl.CULL_FACE);
                gl.cullFace(gl.BACK);

                const eye = getCameraEye();
                const viewMat = m4LookAt(eye, camera.target, camera.up);
                const projMat = m4Perspective(camera.fov, aspect, camera.near, camera.far);
                const vpMat = m4Multiply(projMat, viewMat);

                const lightView = m4LookAt(lightPos, lightTarget, lightUp);
                const lightProj = m4Ortho(-18, 18, -18, 18, 0.5, 70);
                const lightMVP = m4Multiply(lightProj, lightView);

                // Render ground
                gl.useProgram(groundProg);
                const groundModel = m4Identity();
                const groundMVP = m4Multiply(vpMat, groundModel);
                gl.uniformMatrix4fv(gl.getUniformLocation(groundProg, 'uMVP'), false, groundMVP);
                gl.uniformMatrix4fv(gl.getUniformLocation(groundProg, 'uLightMVP'), false, m4Multiply(lightMVP,
                groundModel));
                gl.uniform3fv(gl.getUniformLocation(groundProg, 'uViewPos'), eye);
                gl.activeTexture(gl.TEXTURE0);
                gl.bindTexture(gl.TEXTURE_2D, shadowTex);
                gl.uniform1i(gl.getUniformLocation(groundProg, 'uShadowMap'), 0);
                gl.bindVertexArray(groundVao);
                gl.drawArrays(gl.TRIANGLES, 0, 6);

                // Render rigid bodies
                gl.useProgram(mainProg);
                gl.uniformMatrix4fv(gl.getUniformLocation(mainProg, 'uLightMVP'), false, lightMVP);
                gl.uniform3fv(gl.getUniformLocation(mainProg, 'uLightDir'), lightDir);
                gl.uniform3fv(gl.getUniformLocation(mainProg, 'uViewPos'), eye);
                gl.uniform1f(gl.getUniformLocation(mainProg, 'uAmbient'), 0.22);
                gl.uniform1f(gl.getUniformLocation(mainProg, 'uShininess'), 48);
                gl.activeTexture(gl.TEXTURE0);
                gl.bindTexture(gl.TEXTURE_2D, shadowTex);
                gl.uniform1i(gl.getUniformLocation(mainProg, 'uShadowMap'), 0);
                const uMVP = gl.getUniformLocation(mainProg, 'uMVP');
                const uModel = gl.getUniformLocation(mainProg, 'uModel');
                const uColor = gl.getUniformLocation(mainProg, 'uColor');

                for (const body of rigidBodies) {
                    if (!body.renderMesh) continue;
                    const modelMat = m4FromQuat(body.orientation);
                    modelMat[12] = body.position[0];
                    modelMat[13] = body.position[1];
                    modelMat[14] = body.position[2];
                    const mvp = m4Multiply(vpMat, modelMat);
                    gl.uniformMatrix4fv(uMVP, false, mvp);
                    gl.uniformMatrix4fv(uModel, false, modelMat);
                    gl.uniform3fv(uColor, body.color);
                    gl.bindVertexArray(body.renderMesh.vao);
                    gl.drawArrays(gl.TRIANGLES, 0, body.renderMesh.vertexCount);
                }

                // Render soft body
                if (softBody) {
                    const renderData = softBody.getRenderVertices();
                    if (renderData.vertexCount > 0) {
                        const tempVao = createTempVAO(renderData);
                        const modelMat = m4Identity();
                        const mvp = m4Multiply(vpMat, modelMat);
                        gl
